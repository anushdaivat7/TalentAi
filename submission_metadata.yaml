# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid explainable ranker. Five component scores (skill 40%, experience 25%,
  project relevance 15%, education 10%, behavioral 10%) form a base score, which
  is then modulated by two multipliers that encode the JD's intent: a decisive
  role-fit signal (title + real career evidence) that defeats keyword-stuffers,
  and a trap-penalty modifier. Final = base x (0.35 + 0.65 * role_fit) x trap.
  Our integrity engine disqualifies 40 honeypots flagged via internal
  contradictions (advanced/expert skills with 0 months of use, tenure exceeding
  stated experience, impossible date ranges) and forces them to the bottom; the
  dataset is documented to contain ~80, with the remainder caught by graded soft
  penalties that down-weight consulting-only careers, job-hoppers, research-only
  profiles, computer-vision/speech-without-NLP, keyword-stuffers and inactive,
  low-response candidates. Per-candidate reasoning strings are generated offline
  and grounded in each profile. The submitted run is feature/rule-based, runs on
  CPU with no network in well under 5 minutes, and tie-breaks deterministically
  (score desc, candidate_id asc). An optional offline embeddings pipeline
  (all-MiniLM-L6-v2 + FAISS) is included for semantic blending on capable hardware.


